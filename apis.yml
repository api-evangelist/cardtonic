name: Cardtonic
description: >-
  Cardtonic is an Africa-focused fintech platform that lets users trade
  gift cards (sell unused cards for cash and buy over 14,000 local and
  international gift cards), issue virtual dollar cards, pay bills
  (airtime, data, electricity, TV, betting), purchase eSIMs in 140+
  countries, and shop for gadgets through its Just Gadgets storefront.
  Cardtonic supports Naira and Cedi settlement for users in Nigeria and
  Ghana, holds PCI DSS certification, and operates under Nigeria Data
  Protection Commission (NDPC) oversight. For businesses, Cardtonic
  offers a Gift Card Developer API (currently waitlist-only) that lets
  merchants embed gift card purchasing, sales, bulk ordering, inventory,
  and redemption into websites, mobile apps, and point-of-sale systems.
